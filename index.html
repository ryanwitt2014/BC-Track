function t2s(t){if(!t)return 9999;var p=t.split(":");return parseInt(p[0])*60+parseFloat(p[1]);}
function s2t(s){if(!s&&s!==0)return "--";var m=Math.floor(s/60);var sc=Math.round(s%60).toString().padStart(2,"0");return m+":"+sc;}
function ms2t(ms){var s=Math.floor(ms/1000);var m=Math.floor(s/60);var sc=(s%60).toString().padStart(2,"0");var cs=Math.floor((ms%1000)/10).toString().padStart(2,"0");return m+":"+sc+"."+cs;}
function projFinish(ms,dd,tot){return (ms/dd)*tot;}
function initials(n){return n?n.split(" ").map(function(x){return x[0];}).join(""):"?";}
function safeGet(obj,key){return obj?obj[key]:null;}

function calcPaces(pr){
  if(!pr)return null;
  var sec=t2s(pr);var mi=sec/1.864;
  return {easy:s2t(mi*1.38),long:s2t(mi*1.43),threshold:s2t(mi*1.12),interval:s2t(mi*1.02),rep:s2t(mi*0.94),race:s2t(mi)};
}
function calcGoal(a,evKey){
  var ev=EVENTS[evKey];if(!ev)return null;
  var pr=a[ev.prKey];
  var sm=a.primary_sport==="distance"?0.97:a.primary_sport==="sprinting"?1.02:a.primary_sport==="strength"?1.04:0.99;
  if(pr)return t2s(pr)*sm;
  if(a.pr_3k){var pm=t2s(a.pr_3k)/3000;if(evKey==="1600m")return pm*1600*0.94*sm;if(evKey==="800m")return pm*800*0.90*sm;if(evKey==="400m")return pm*400*0.86*sm;}
  return null;
}

// Track-to-XC prediction engine
// Uses Riegel formula: T2 = T1 * (D2/D1)^1.06
function riegelPredict(knownTime, knownDist, targetDist){
  if(!knownTime||knownTime>=9999)return null;
  return knownTime * Math.pow(targetDist/knownDist, 1.06);
}
function calcTrackPredictions(athlete){
  var preds = [];
  var sources = [];
  // Collect all known track PRs
  if(athlete.pr_400) sources.push({time:t2s(athlete.pr_400),dist:400,label:"400m"});
  if(athlete.pr_800) sources.push({time:t2s(athlete.pr_800),dist:800,label:"800m"});
  if(athlete.pr_1600) sources.push({time:t2s(athlete.pr_1600),dist:1600,label:"1600m"});
  if(athlete.pr_baseline) sources.push({time:t2s(athlete.pr_baseline),dist:1609,label:"1mi baseline"});
  if(sources.length===0) return null;
  // Predict 3K from each source
  var pred3k = sources.map(function(s){
    return {from:s.label, sec:riegelPredict(s.time,s.dist,3000)};
  }).filter(function(p){return p.sec&&p.sec<9999;});
  if(pred3k.length===0) return null;
  // Average all predictions for best estimate
  var avg3k = pred3k.reduce(function(sum,p){return sum+p.sec;},0)/pred3k.length;
  // Best (fastest) single prediction
  var best3k = Math.min.apply(null, pred3k.map(function(p){return p.sec;}));
  // Also predict other distances from best available
  var bestSrc = sources.reduce(function(a,b){return a.dist>b.dist?a:b;}); // use longest for cross-predict
  return {
    pred3k: s2t(avg3k),
    pred3kBest: s2t(best3k),
    pred5k: s2t(riegelPredict(bestSrc.time,bestSrc.dist,5000)),
    pred1600: athlete.pr_1600?null:s2t(riegelPredict(bestSrc.time,bestSrc.dist,1600)),
    pred800: athlete.pr_800?null:s2t(riegelPredict(bestSrc.time,bestSrc.dist,800)),
    sources: pred3k,
    paces: calcPaces(s2t(avg3k))
  };
}
function calcProjections(athlete,results,meets){
  var mr=results.filter(function(r){return r.athlete_id===athlete.id&&r.time&&r.time.indexOf("_split")===-1;}).map(function(r){var mt=meets.find(function(m){return m.id===r.meet_id;});return Object.assign({},r,{meet:mt});}).sort(function(a,b){return new Date(safeGet(a.meet,"date")||0)-new Date(safeGet(b.meet,"date")||0);});
  if(mr.length<3)return null;
  var allTimes=mr.map(function(r){return t2s(r.time);}).filter(function(t){return t<9999;});
  if(allTimes.length<3)return null;
  var best=Math.min.apply(null,allTimes);
  var sorted=allTimes.slice().sort(function(a,b){return a-b;});
  var second=sorted[1]||sorted[0];
  var bestImprovement=Math.max(second-best,0);
  var perMeet=Math.min(bestImprovement/2,8);
  var pr=best;
  var rem=Math.max(meets.filter(function(m){return m.status==="upcoming"||m.status==="next";}).length,1);
  var nextMeet=s2t(Math.max(pr-perMeet,pr*0.97));
  var eos=s2t(Math.max(pr-(perMeet*rem),pr*0.93));
  var nextYear=athlete.grade<=8?s2t(Math.max(pr-(perMeet*8),pr*0.87)):null;
  return {avg:perMeet.toFixed(1),nextMeet:nextMeet,eos:eos,nextYear:nextYear,count:mr.length,trending:bestImprovement>2};

function useDaysUntil(dateStr){
  if(!dateStr) return null;
  var today=new Date(); today.setHours(0,0,0,0);
  var meet=new Date(dateStr); meet.setHours(0,0,0,0);
  var diff=Math.round((meet-today)/(1000*60*60*24));
  return diff;
}
