const t2s = t => { if(!t) return 9999; const p=t.split(":"); return parseInt(p[0])*60+parseFloat(p[1]); };
const s2t = s => { if(!s&&s!==0) return "--"; const m=Math.floor(s/60); const sc=Math.round(s%60).toString().padStart(2,"0"); return m+":"+sc; };
const ms2t = ms => { const s=Math.floor(ms/1000); const m=Math.floor(s/60); const sc=(s%60).toString().padStart(2,"0"); const cs=Math.floor((ms%1000)/10).toString().padStart(2,"0"); return m+":"+sc+"."+cs; };
const projFinish = (ms,dd,tot) => (ms/dd)*tot;
const initials = n => n ? n.split(" ").map(x=>x[0]).join("") : "?";

const calcPaces = pr => {
  if(!pr) return null;
  const sec=t2s(pr); const mi=sec/1.864;
  return {easy:s2t(mi*1.38),long:s2t(mi*1.43),threshold:s2t(mi*1.12),interval:s2t(mi*1.02),rep:s2t(mi*0.94),race:s2t(mi)};
};
const calcGoal = (a,evKey) => {
  const ev=EVENTS[evKey]; if(!ev) return null;
  const pr=a[ev.prKey];
  const sm=a.primary_sport==="distance"?0.97:a.primary_sport==="sprinting"?1.02:a.primary_sport==="strength"?1.04:0.99;
  if(pr) return t2s(pr)*sm;
  if(a.pr_3k){const pm=t2s(a.pr_3k)/3000;if(evKey==="1600m")return pm*1600*0.94*sm;if(evKey==="800m")return pm*800*0.90*sm;if(evKey==="400m")return pm*400*0.86*sm;}
  return null;
};
const calcProjections = (athlete,results,meets) => {
  const mr=results.filter(r=>r.athlete_id===athlete.id&&r.time&&!r.time.includes("_split")).map(r=>({...r,meet:meets.find(m=>m.id===r.meet_id)})).sort((a,b)=>new Date(a.meet?.date||0)-new Date(b.meet?.date||0));
  if(mr.length<3) return null;
  const allTimes=mr.map(r=>t2s(r.time)).filter(t=>t<9999);
  if(allTimes.length<3) return null;
  const pr=Math.min(...allTimes);
  // Only use times within 5% of PR to avoid course/weather outliers skewing averages
  const cleanTimes=allTimes.filter(t=>t<=pr*1.05);
  // Calculate improvement using only the two best times (most reliable signal)
  const sorted=[...allTimes].sort((a,b)=>a-b);
  const best=sorted[0];
  const second=sorted[1]||sorted[0];
  // Average improvement per meet based on best vs second best
  const bestImprovement=Math.max(second-best,0);
  // Also look at last 3 meets trend
  const recent=allTimes.slice(-3);
  const recentBest=Math.min(...recent);
  const recentWorst=Math.max(...recent);
  const recentRange=recentWorst-recentBest;
  // Use conservative estimate: small improvement per meet
  const perMeet=Math.min(bestImprovement/2, 8); // cap at 8s per meet improvement
  const last=allTimes[allTimes.length-1];
  const rem=Math.max(meets.filter(m=>m.status==="upcoming"||m.status==="next").length,1);
  // Always project from PR, never from a bad race
  const nextMeet=s2t(Math.max(pr-perMeet, pr*0.97));
  const eos=s2t(Math.max(pr-(perMeet*rem), pr*0.93));
  const nextYear=athlete.grade<=8?s2t(Math.max(pr-(perMeet*8), pr*0.87)):null;
  const trending=bestImprovement>2;
  return {avg:perMeet.toFixed(1),nextMeet,eos,nextYear,count:mr.length,trending,pr:s2t(pr)};
};

function PinGate({onSuccess}){
  const [pin,setPin]=useState("");const [shake,setShake]=useState(false);
  const tap=k=>{if(k==="X"){setPin(p=>p.slice(0,-1));return;}if(pin.length>=4)return;const np=pin+k;setPin(np);if(np.length===4){setTimeout(()=>{if(np===PIN){onSuccess();setPin("");}else{setShake(true);setPin("");setTimeout(()=>setShake(false),500);}},200);}};
  return <div style={{padding:"40px 24px",display:"flex",flexDirection:"column",alignItems:"center"}}>
    <div style={{width:72,height:72,borderRadius:20,background:"linear-gradient(135deg,#1A1A1A,#2A2A2A)",border:"1px solid "+C.cardBorder,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:24,boxShadow:"0 0 30px "+C.goldBright+"22"}}><Icon n="lock" size={32} color={C.goldBright}/></div>
    <div style={{fontSize:22,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.white,marginBottom:6}}>COACH PORTAL</div>
    <div style={{fontSize:12,color:C.muted,fontFamily:"'Oswald',sans-serif",marginBottom:36}}>Enter your PIN</div>
    <div style={{display:"flex",gap:12,marginBottom:32,animation:shake?"shake 0.4s ease":"none"}}>
      {[0,1,2,3].map(i=><div key={i} style={{width:14,height:14,borderRadius:"50%",background:i<pin.length?C.goldBright:C.subtle,border:"1px solid "+(i<pin.length?C.goldBright:C.cardBorder),transition:"all 0.2s"}}/>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,width:"100%",maxWidth:280}}>
      {[1,2,3,4,5,6,7,8,9,"",0,"X"].map((k,i)=><button key={i} onClick={()=>k!==""&&tap(String(k))} style={{padding:"17px 0",background:k===""?"transparent":C.card,border:k===""?"none":"1px solid "+C.cardBorder,borderRadius:12,color:C.white,fontSize:20,cursor:k===""?"default":"pointer"}}>{k==="X"?"del":k}</button>)}
    </div>
  </div>;
}

let _addNotif=null;
function useNotifs(){const [notifs,setNotifs]=useState([]);_addNotif=(msg,type)=>{const id=Date.now();setNotifs(p=>[...p,{id,msg,type:type||"info"}]);setTimeout(()=>setNotifs(p=>p.filter(n=>n.id!==id)),4500);};return notifs;}
function notify(msg,type){if(_addNotif)_addNotif(msg,type);}

function LiveTiming({athletes,meets,onClose}){
  const [phase,setPhase]=useState("setup");const [evKey,setEvKey]=useState("3K XC");const [gender,setGender]=useState("boys");const [meetId,setMeetId]=useState("");
  const [running,setRunning]=useState(false);const [elapsed,setElapsed]=useState(0);const [adMap,setAdMap]=useState({});const [finCount,setFinCount]=useState(0);const [saving,setSaving]=useState(false);const [saved,setSaved]=useState(false);
  const notifs=useNotifs();const t0=useRef(null);const tmr=useRef(null);const ev=EVENTS[evKey];
  const roster=[...athletes.filter(a=>a.gender===gender)].sort((a,b)=>t2s(a.pr_3k||"99:99")-t2s(b.pr_3k||"99:99"));
  const Stars=({a})=>{if(!a.parent_phone)return null;const c=a.parent_phone.split(",").filter(Boolean).length;return <span>{Array.from({length:c}).map((_,i)=><svg key={i} width="10" height="10" viewBox="0 0 24 24" fill={C.goldBright} stroke={C.goldBright} strokeWidth="1" style={{marginLeft:3}}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>)}</span>;};
  useEffect(()=>{if(running){t0.current=Date.now()-elapsed;tmr.current=setInterval(()=>setElapsed(Date.now()-t0.current),50);}else clearInterval(tmr.current);return()=>clearInterval(tmr.current);},[running]);
  useEffect(()=>{const d={};roster.forEach(a=>{d[a.id]={goalSec:calcGoal(a,evKey),splits:[],done:false,place:null};});setAdMap(d);setFinCount(0);},[evKey,gender]);
  const nextCp=id=>{const ad=adMap[id];if(!ad||ad.done)return null;const done=ad.splits.map(s=>s.cpId);return ev.checkpoints.find(c=>!done.includes(c.id))||null;};
  const tapAthlete=a=>{
    if(!running)return;const cp=nextCp(a.id);if(!cp)return;
    const ms=elapsed;const ad=adMap[a.id];const gs=ad.goalSec;
    const projMs=cp.id!=="finish"?projFinish(ms,cp.dist,cp.total):ms;
    const atGoal=gs?gs*(cp.dist/cp.total)*1000:null;const status=!atGoal?"on":ms-atGoal<-1500?"ahead":"on";
    const isF=cp.id==="finish";let place=null;if(isF){place=finCount+1;setFinCount(c=>c+1);}
    setAdMap(prev=>({...prev,[a.id]:{...prev[a.id],splits:[...prev[a.id].splits,{cpId:cp.id,label:cp.label,ms,timeStr:ms2t(ms),projMs,status}],done:isF,place}}));
    const name=a.short_name||a.name;const mn=meets.find(m=>m.id===meetId)?.name||"Today";const gs2=gs?s2t(gs):"--";
    if(isF){const met=gs&&(ms/1000)<=gs*1.01;notify(name+" finished "+ev.short+" in "+ms2t(ms)+" at "+mn+". Goal: "+gs2+(met?". GOAL MET!":"."),met?"success":"alert");}
    else notify(name+" - "+cp.label+": "+ms2t(ms)+" | Proj: "+s2t(projMs/1000)+(status==="ahead"?" | AHEAD":""),status==="ahead"?"success":"info");
  };

      await db.post("results",{athlete_id:a.id,meet_id:meetId,time:timeStr,place:ad.place,goal_time:goalTime});
      const spl=ad.splits.filter(s=>s.cpId!=="finish").map(s=>s.label+": "+s.timeStr).join(" | ");
      if(spl)await db.post("results",{athlete_id:a.id,meet_id:meetId,time:timeStr+"_split",notes:spl});
      const pk=ev.prKey;if(!a[pk]||t2s(timeStr)<t2s(a[pk]))await db.patch("athletes",a.id,{[pk]:timeStr});}
    setSaving(false);setSaved(true);notify("Results saved","success");

function useWeather(city, date) {
  const [weather, setWeather] = useState(null);
  useEffect(() => {
    if (!city) return;
    const fetchW = async () => {
      try {
        const geo = await fetch("https://api.openweathermap.org/geo/1.0/direct?q="+encodeURIComponent(city)+",US&limit=1&appid="+WEATHER_KEY);
        const gd = await geo.json();
        if (!gd[0]) return;
        const {lat, lon} = gd[0];
        const fc = await fetch("https://api.openweathermap.org/data/2.5/forecast?lat="+lat+"&lon="+lon+"&appid="+WEATHER_KEY+"&units=imperial");
        const fd = await fc.json();
        if (!fd.list) return;
        // Find forecast closest to meet date
        const target = date ? new Date(date).toDateString() : new Date().toDateString();
        const entry = fd.list.find(e => new Date(e.dt*1000).toDateString() === target) || fd.list[0];
        setWeather({
          high: Math.round(entry.main.temp_max),
          low: Math.round(entry.main.temp_min),
          desc: entry.weather[0].description,
          icon: entry.weather[0].main,
        });
      } catch(e) { console.log("Weather error",e); }
    };
    fetchW();
  }, [city, date]);
  return weather;
}

function useMeetRecap(meet, athletes, results) {
  const [recap, setRecap] = useState(null);
  const [loading, setLoading] = useState(false);
  useEffect(() => {
    if (!meet || meet.status !== "done") return;
    setLoading(true);
    const genRecap = async () => {
      try {
        const meetResults = results.filter(r => r.meet_id === meet.id && r.time && !r.time.includes("_split"))
          .map(r => ({...r, athlete: athletes.find(a => a.id === r.athlete_id)}))
          .sort((a,b) => (a.place||99)-(b.place||99));
        const topBoys = meetResults.filter(r=>r.athlete?.gender==="boys").slice(0,5);
        const topGirls = meetResults.filter(r=>r.athlete?.gender==="girls").slice(0,5);
        const prompt = "Write a 3-sentence school announcement about a cross country meet result. Tone: excited, school pride, mention specific athletes by first and last name. Meet: "+meet.name+" on "+meet.date+(meet.location?" at "+meet.location:"")+". Boys finished "+( meet.boys_place?"in "+meet.boys_place+(meet.boys_place===1?"st":meet.boys_place===2?"nd":meet.boys_place===3?"rd":"th")+" place"+(meet.boys_points?" with "+meet.boys_points+" points":""):"did not have team score recorded")+". Girls finished "+(meet.girls_place?"in "+meet.girls_place+(meet.girls_place===1?"st":meet.girls_place===2?"nd":meet.girls_place===3?"rd":"th")+" place"+(meet.girls_points?" with "+meet.girls_points+" points":""):"did not have team score recorded")+". Top boys finishers: "+topBoys.map(r=>r.athlete?.name+" ("+r.time+", #"+r.place+")").join(", ")+". Top girls finishers: "+topGirls.map(r=>r.athlete?.name+" ("+r.time+", #"+r.place+")").join(", ")+". School name: Benton Central. Team nickname: The Herd. Keep it under 100 words. Do not use quotes around the text. Just write the announcement directly.";
        const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
          method: "POST",
          headers: {"Content-Type":"application/json","Authorization":"Bearer "+GROQ_KEY},
          body: JSON.stringify({model:"llama3-8b-8192",messages:[{role:"user",content:prompt}],max_tokens:200,temperature:0.7})
        });
        const d = await resp.json();
        const text = d.choices?.[0]?.message?.content || "";
        setRecap(text);
      } catch(e) { setRecap(null); }
      setLoading(false);
    };
    genRecap();
  }, [meet?.id]);
  return {recap, loading};
}

function MeetRecapCard({meet, athletes, results, onViewAthlete}) {
  const {recap, loading} = useMeetRecap(meet, athletes, results);
  const [photoIdx, setPhotoIdx] = useState(0);
  const photos = meet.photos ? meet.photos.split(",").filter(Boolean) : [];
  useEffect(() => {
    if (photos.length <= 1) return;
    const t = setInterval(() => setPhotoIdx(i => (i+1) % photos.length), 4000);
    return () => clearInterval(t);
  }, [photos.length]);

  // Parse recap text and hyperlink athlete names
  const renderRecapWithLinks = (text) => {
    if (!text) return null;
    const parts = [];
    let remaining = text;
    athletes.forEach(a => {
      const name = a.name;
      if (remaining.includes(name)) {
        const idx = remaining.indexOf(name);
        if (idx > 0) parts.push({type:"text", val: remaining.slice(0, idx)});
        parts.push({type:"link", val: name, athlete: a});
        remaining = remaining.slice(idx + name.length);
      }
    });
    parts.push({type:"text", val: remaining});
    return parts.map((p,i) => p.type==="link"
      ? <span key={i} onClick={()=>onViewAthlete(p.athlete)} style={{color:C.goldBright,fontWeight:700,textDecoration:"underline",cursor:"pointer",textDecorationColor:C.goldDim}}>{p.val}</span>
      : <span key={i}>{p.val}</span>
    );
  };

  return <div style={{background:C.card,border:"1px solid "+C.cardBorder,borderRadius:14,overflow:"hidden",marginBottom:16}}>
    {/* Photo carousel */}
    {photos.length > 0 && <div style={{position:"relative",height:160,overflow:"hidden",background:C.subtle}}>
      <img src={photos[photoIdx]} alt="Meet photo" style={{width:"100%",height:"100%",objectFit:"cover",transition:"opacity 0.5s"}}/>
      {photos.length > 1 && <div style={{position:"absolute",bottom:8,left:0,right:0,display:"flex",justifyContent:"center",gap:4}}>
        {photos.map((_,i)=><div key={i} style={{width:i===photoIdx?16:6,height:6,borderRadius:3,background:i===photoIdx?C.goldBright:C.muted,transition:"all 0.3s"}}/>)}
      </div>}
    </div>}
    <div style={{padding:16}}>
      <div style={{fontSize:9,color:C.gold,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.3em",marginBottom:6}}>LAST MEET RECAP</div>
      <div style={{fontSize:18,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.white,marginBottom:4}}>{meet.name}</div>
      <div style={{fontSize:11,color:C.muted,fontFamily:"'Oswald',sans-serif",marginBottom:12}}>{meet.date}{meet.location?" - "+meet.location:""}</div>
      {/* Team scores */}
      {(meet.boys_place || meet.girls_place) && <div style={{display:"flex",gap:8,marginBottom:12}}>
        {meet.boys_place && <div style={{flex:1,background:"linear-gradient(135deg,#1A1000,"+C.subtle+")",border:"1px solid "+C.gold+"44",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
          <div style={{fontSize:9,color:C.muted,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.2em",marginBottom:4}}>BOYS</div>
          <div style={{fontSize:28,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.goldBright}}>{meet.boys_place}<span style={{fontSize:13}}>{meet.boys_place===1?"st":meet.boys_place===2?"nd":meet.boys_place===3?"rd":"th"}</span></div>
          {meet.boys_points && <div style={{fontSize:10,color:C.gold,fontFamily:"'Oswald',sans-serif"}}>{meet.boys_points} pts</div>}
        </div>}
        {meet.girls_place && <div style={{flex:1,background:"linear-gradient(135deg,#1A1000,"+C.subtle+")",border:"1px solid "+C.gold+"44",borderRadius:10,padding:"10px 12px",textAlign:"center"}}>
          <div style={{fontSize:9,color:C.muted,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.2em",marginBottom:4}}>GIRLS</div>
          <div style={{fontSize:28,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.goldBright}}>{meet.girls_place}<span style={{fontSize:13}}>{meet.girls_place===1?"st":meet.girls_place===2?"nd":meet.girls_place===3?"rd":"th"}</span></div>
          {meet.girls_points && <div style={{fontSize:10,color:C.gold,fontFamily:"'Oswald',sans-serif"}}>{meet.girls_points} pts</div>}
        </div>}
      </div>}
      {/* AI Recap */}
      {loading && <div style={{fontSize:12,color:C.muted,fontFamily:"'Oswald',sans-serif",fontStyle:"italic",padding:"8px 0"}}>Generating recap...</div>}
      {recap && <div style={{fontSize:13,color:C.offWhite,fontFamily:"Georgia,serif",fontStyle:"italic",lineHeight:1.7,padding:"10px 0",borderTop:"1px solid "+C.cardBorder}}>{renderRecapWithLinks(recap)}</div>}
    </div>
  </div>;
}

function MyAthleteCard({athlete, meets, results, onView}) {
  const next = meets.find(m=>m.status==="next");
  const goalSec = next ? calcGoal(athlete, "3K XC") : null;
  const weather = useWeather(next?.city, next?.date);
  const [showAlertInput, setShowAlertInput] = useState(false);
  const [phone, setPhone] = useState(athlete.parent_phone||"");
  const [saving, setSaving] = useState(false);
  const savePhone = async () => {
    setSaving(true);
    await db.patch("athletes", athlete.id, {parent_phone: phone});
    setSaving(false); setShowAlertInput(false);
  };
  return <div style={{background:"linear-gradient(135deg,#1A1000,"+C.card+")",border:"1px solid "+C.gold+"55",borderRadius:14,padding:16,marginBottom:10}}>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
      <Avatar athlete={athlete} size={52} border={true}/>
      <div style={{flex:1}}>
        <div style={{fontSize:18,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.white}}>{athlete.name}</div>
        <div style={{fontSize:10,color:C.gold,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.15em",marginTop:2}}>GRADE {athlete.grade} - {athlete.gender==="boys"?"BOYS":"GIRLS"} XC</div>
        {athlete.badge&&<div style={{display:"inline-block",marginTop:5,padding:"2px 8px",background:C.gold+"22",border:"1px solid "+C.gold+"44",borderRadius:4,fontSize:9,color:C.goldBright,fontFamily:"'Oswald',sans-serif"}}>{athlete.badge}</div>}
      </div>
      <button onClick={()=>onView(athlete)} style={{padding:"6px 12px",background:"linear-gradient(135deg,#1A1000,#2A1800)",border:"1px solid "+C.goldBright,borderRadius:8,color:C.goldBright,fontSize:10,fontFamily:"'Oswald',sans-serif",cursor:"pointer",fontWeight:700}}>PROFILE</button>
    </div>
    {/* Stats row */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
      <div style={{background:C.black+"88",borderRadius:8,padding:"8px 10px"}}>
        <div style={{fontSize:9,color:C.muted,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.15em",marginBottom:3}}>CURRENT PR</div>
        <div style={{fontSize:20,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.goldBright}}>{athlete.pr_3k||"--"}</div>
      </div>
      <div style={{background:C.black+"88",borderRadius:8,padding:"8px 10px"}}>
        <div style={{fontSize:9,color:C.muted,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.15em",marginBottom:3}}>NEXT MEET GOAL</div>
        <div style={{fontSize:20,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.gold}}>{goalSec?s2t(goalSec):"--"}</div>
      </div>
    </div>
    {/* Next meet info */}
    {next && <div style={{background:C.black+"66",borderRadius:8,padding:"10px 12px",marginBottom:12}}>
      <div style={{fontSize:9,color:C.muted,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.2em",marginBottom:6}}>NEXT MEET</div>
      <div style={{fontSize:14,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.white,marginBottom:4}}>{next.name}</div>
      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
        {next.date&&<div style={{fontSize:11,color:C.offWhite,fontFamily:"'Oswald',sans-serif"}}>{next.date}</div>}
        {next.start_time&&<div style={{fontSize:11,color:C.offWhite,fontFamily:"'Oswald',sans-serif"}}>Start: {next.start_time}</div>}
        {next.bus_time&&<div style={{fontSize:11,color:C.goldBright,fontFamily:"'Oswald',sans-serif"}}>Bus: {next.bus_time}</div>}
      </div>
      {/* Weather */}
      {weather && <div style={{display:"flex",alignItems:"center",gap:10,marginTop:10,padding:"8px 10px",background:C.subtle,borderRadius:8}}>
        <WeatherIcon icon={weather.icon} size={26}/>
        <div>
          <div style={{fontSize:12,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.white}}>{weather.high}F / {weather.low}F</div>
          <div style={{fontSize:10,color:C.muted,fontFamily:"'Oswald',sans-serif",textTransform:"capitalize"}}>{weather.desc}</div>
        </div>
        {next.city&&<div style={{marginLeft:"auto",fontSize:10,color:C.muted,fontFamily:"'Oswald',sans-serif"}}>{next.city}</div>}
      </div>}
    </div>}
    {/* Alert signup */}
    {!showAlertInput
      ? <button onClick={()=>setShowAlertInput(true)} style={{width:"100%",padding:"8px",background:athlete.parent_phone?"transparent":"linear-gradient(135deg,#1A1000,#2A1800)",border:"1px solid "+(athlete.parent_phone?C.cardBorder:C.goldBright),borderRadius:8,color:athlete.parent_phone?C.muted:C.goldBright,fontSize:11,fontFamily:"'Oswald',sans-serif",cursor:"pointer"}}>
          {athlete.parent_phone?"Alerts active - tap to update phone":"Sign up for in-app alerts"}
        </button>
      : <div style={{display:"flex",gap:8}}>
          <input placeholder="Your phone number" value={phone} onChange={e=>setPhone(e.target.value)} style={{flex:1,padding:"8px 10px",background:C.subtle,border:"1px solid "+C.cardBorder,borderRadius:8,color:C.white,fontFamily:"'Oswald',sans-serif",fontSize:12}}/>
          <button onClick={savePhone} disabled={saving} style={{padding:"8px 14px",background:"linear-gradient(135deg,#1A1000,#2A1800)",border:"1px solid "+C.goldBright,borderRadius:8,color:C.goldBright,fontSize:11,fontFamily:"'Oswald',sans-serif",cursor:"pointer"}}>{saving?"...":"SAVE"}</button>
          <button onClick={()=>setShowAlertInput(false)} style={{padding:"8px 10px",background:C.card,border:"1px solid "+C.cardBorder,borderRadius:8,color:C.muted,fontSize:11,cursor:"pointer"}}>X</button>
        </div>
    }
  </div>;
}

function AthletesTab({athletes,onView,favIds,onToggleFav}){
  const [gender,setGender]=useState("boys");const V=6;
  const list=[...athletes.filter(a=>a.gender===gender)].sort((a,b)=>t2s(a.pr_3k||"99:99")-t2s(b.pr_3k||"99:99"));
  return <div style={{padding:"20px 16px"}}>
    <div style={{marginBottom:14}}><div style={{fontSize:10,color:C.muted,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.25em"}}>TEAM STANDINGS</div><div style={{fontSize:26,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.white}}>THE HERD</div></div>
    <div style={{display:"flex",background:C.card,borderRadius:10,padding:3,border:"1px solid "+C.cardBorder,marginBottom:14}}>
      {["boys","girls"].map(g=><button key={g} onClick={()=>setGender(g)} style={{flex:1,padding:"9px 0",background:gender===g?"linear-gradient(135deg,#1A1000,#2A1800)":"transparent",border:"none",borderRadius:8,color:gender===g?C.goldBright:C.muted,fontSize:12,cursor:"pointer",fontWeight:gender===g?700:400}}>{g.toUpperCase()}</button>)}
    </div>
    {list.map((a,i)=><div key={a.id}>
      {i===V&&<div style={{display:"flex",alignItems:"center",gap:8,margin:"6px 0 10px"}}><div style={{flex:1,height:1,background:C.gold}}/><div style={{fontSize:9,color:C.gold,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.25em",whiteSpace:"nowrap"}}>VARSITY CUT LINE</div><div style={{flex:1,height:1,background:C.gold}}/></div>}
      <button onClick={()=>onView(a)} style={{width:"100%",display:"flex",alignItems:"center",background:C.card,borderRadius:11,border:"1px solid "+C.cardBorder,padding:"11px 12px",marginBottom:8,cursor:"pointer",textAlign:"left",opacity:i>=V?0.75:1}}>
        <div style={{width:24,fontSize:13,color:i<3?C.goldBright:C.muted,fontFamily:"'Oswald',sans-serif",fontWeight:700}}>{i+1}</div>
        <button onClick={e=>{e.stopPropagation();onToggleFav(a.id);}} style={{background:"none",border:"none",cursor:"pointer",marginRight:6,flexShrink:0}}><svg width="16" height="16" viewBox="0 0 24 24" fill={favIds.includes(a.id)?C.goldBright:"none"} stroke={favIds.includes(a.id)?C.goldBright:C.muted} strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
        <Avatar athlete={a} size={34}/><div style={{flex:1,marginLeft:8}}><div style={{fontSize:14,fontFamily:"'Oswald',sans-serif",fontWeight:600,color:C.white}}>{a.short_name||a.name}</div><div style={{fontSize:10,color:C.muted,fontFamily:"'Oswald',sans-serif",marginTop:1}}>GR {a.grade}</div></div>
        <div style={{marginRight:10,fontSize:16,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.white}}>{a.pr_3k||"--"}</div>
        <div style={{fontSize:12,color:C.goldBright,fontFamily:"'Oswald',sans-serif"}}>{a.pr_3k?s2t(t2s(a.pr_3k)*0.984):"--"}</div>
      </button>
    </div>)}
  </div>;
}

function AthleteProfile({athlete,results,meets,onBack,isFav,onToggleFav}){
  const [sub,setSub]=useState("overview");const a=athlete;const paces=calcPaces(a.pr_3k);
  const allR=results.filter(r=>r.athlete_id===a.id);
  const myR=allR.filter(r=>r.time&&!r.time.includes("_split")).map(r=>({...r,meet:meets.find(m=>m.id===r.meet_id)})).sort((x,y)=>new Date(x.meet?.date||0)-new Date(y.meet?.date||0));
  const proj=calcProjections(a,results,meets);
  const age={6:11,7:12,8:13,9:14,10:15,11:16,12:17}[a.grade]||(a.grade+5);
  return <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    <div style={{background:"linear-gradient(160deg,#0A0800,"+C.black+")",paddingTop:58,paddingBottom:0,paddingLeft:18,paddingRight:18,borderBottom:"1px solid "+C.cardBorder,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(to right,"+C.goldDim+","+C.goldBright+","+C.goldDim+")"}}/>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer"}}><Icon n="back" size={22} color={C.muted}/></button>
        <div style={{flex:1,fontSize:10,color:C.muted,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.2em"}}>ATHLETE PROFILE</div>
        <button onClick={()=>onToggleFav(a.id)} style={{background:"none",border:"none",cursor:"pointer"}}><svg width="22" height="22" viewBox="0 0 24 24" fill={isFav?C.goldBright:"none"} stroke={isFav?C.goldBright:C.muted} strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
      </div>
      <div style={{display:"flex",alignItems:"flex-end",gap:14,paddingBottom:14}}>
        <Avatar athlete={a} size={64} border={true}/>
        <div style={{flex:1}}><div style={{fontSize:22,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.white,lineHeight:1.1}}>{a.name}</div><div style={{fontSize:11,color:C.gold,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.1em",marginTop:3}}>GRADE {a.grade} - AGE {age} - {a.gender==="boys"?"BOYS":"GIRLS"} XC</div>{a.badge&&<div style={{display:"inline-block",marginTop:6,padding:"3px 10px",background:C.gold+"22",border:"1px solid "+C.gold+"55",borderRadius:6,fontSize:10,color:C.goldBright,fontFamily:"'Oswald',sans-serif"}}>{a.badge}</div>}</div>
      </div>
      <div style={{display:"flex",borderTop:"1px solid "+C.cardBorder,marginLeft:-18,marginRight:-18}}>
        {["overview","paces","meets","projections"].map(t=><button key={t} onClick={()=>setSub(t)} style={{flex:1,padding:"10px 0",background:"none",border:"none",borderBottom:sub===t?"2px solid "+C.goldBright:"2px solid transparent",color:sub===t?C.goldBright:C.muted,fontFamily:"'Oswald',sans-serif",fontSize:9,letterSpacing:"0.1em",cursor:"pointer",textTransform:"uppercase"}}>{t}</button>)}
      </div>
    </div>
    <div style={{flex:1,overflowY:"auto"}}>
      {sub==="overview"&&<div style={{padding:"18px 16px"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          {[{l:"3K PR",v:a.pr_3k||"--",ac:C.goldBright},{l:"PROJECTED",v:a.pr_3k?s2t(t2s(a.pr_3k)*0.984):"--",ac:C.gold},{l:"ATTENDANCE",v:(a.attendance||100)+"%",ac:C.goldDim},{l:"WEEKLY MI",v:(a.weekly_mileage||0)+"mi",ac:C.muted}].map(s=><div key={s.l} style={{background:C.card,borderRadius:12,padding:"14px 14px",border:"1px solid "+C.cardBorder,position:"relative",overflow:"hidden"}}><div style={{position:"absolute",top:0,left:0,right:0,height:2,background:s.ac}}/><div style={{fontSize:9,color:C.muted,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.2em",marginBottom:6}}>{s.l}</div><div style={{fontSize:26,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.white,lineHeight:1}}>{s.v}</div></div>)}
        </div>
        {proj&&<div style={{background:"linear-gradient(135deg,#180E00,"+C.card+")",border:"1px solid "+C.gold+"44",borderRadius:14,padding:14,marginBottom:14}}>

function WorkoutBuilder({onBack,onRefresh,showMsg,athletes}){
  const td=DAYS[new Date().getDay()===0?6:new Date().getDay()-1];
  const [day,setDay]=useState(td);const [label,setLabel]=useState("");const [notes,setNotes]=useState("");const [saving,setSaving]=useState(false);
  const [segs,setSegs]=useState([{id:1,paceType:"easy",amount:"",unit:"miles",reps:"1"}]);
  const sa=athletes.find(a=>a.pr_3k);const sp=sa?calcPaces(sa.pr_3k):null;
  const addSeg=()=>setSegs(p=>[...p,{id:Date.now(),paceType:"easy",amount:"",unit:"miles",reps:"1"}]);
  const remSeg=id=>setSegs(p=>p.filter(s=>s.id!==id));
  const updSeg=(id,f,v)=>setSegs(p=>p.map(s=>s.id===id?{...s,[f]:v}:s));
  const buildDetail=()=>segs.map(s=>{const pt=PACE_TYPES.find(p=>p.id===s.paceType);const rep=parseInt(s.reps)>1?s.reps+"x":"";const unit=s.unit==="miles"?"mi":s.unit==="minutes"?"min":"m";return rep+(s.amount||"?")+" "+unit+" @ "+(pt?pt.label:s.paceType);}).join(" + ");
  const save=async()=>{
    if(!day||!label)return;setSaving(true);
    const d=new Date();d.setDate(d.getDate()-(d.getDay()===0?6:d.getDay()-1));
    const hasH=segs.some(s=>["threshold","interval","rep","race"].includes(s.paceType));const isR=segs.every(s=>s.paceType==="rest");
    await db.post("workouts",{week_start:d.toISOString().split("T")[0],day,label:label.trim(),detail:buildDetail(),type:isR?"rest":hasH?"hard":"easy",notes:notes||null});
    setSaving(false);setLabel("");setNotes("");setSegs([{id:1,paceType:"easy",amount:"",unit:"miles",reps:"1"}]);onRefresh();showMsg(day+" posted!");
  };
  const inp=ex=>({width:"100%",padding:"10px 12px",background:C.subtle,border:"1px solid "+C.cardBorder,borderRadius:8,color:C.white,fontFamily:"'Oswald',sans-serif",fontSize:13,...(ex||{})});
  return <div style={{padding:"20px 16px"}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}><button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer"}}><Icon n="back" size={22} color={C.muted}/></button><div style={{fontSize:20,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.white}}>POST WORKOUT</div></div>
    <div style={{fontSize:9,color:C.muted,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.25em",marginBottom:8}}>DAY</div>
    <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
      {DAYS.map(d=><button key={d} onClick={()=>setDay(d)} style={{flexShrink:0,padding:"8px 12px",background:day===d?"linear-gradient(135deg,#1A1000,#2A1800)":C.card,border:"1px solid "+(day===d?C.goldBright:C.cardBorder),borderRadius:8,color:day===d?C.goldBright:C.muted,fontFamily:"'Oswald',sans-serif",fontSize:11,fontWeight:day===d?700:400,cursor:"pointer",position:"relative"}}>
        {d}{d===td&&<div style={{width:4,height:4,borderRadius:"50%",background:C.goldBright,margin:"2px auto 0"}}/>}
      </button>)}
    </div>
    <input placeholder="Workout name (e.g. Threshold Run)" value={label} onChange={e=>setLabel(e.target.value)} style={{...inp(),marginBottom:16}}/>
    <div style={{fontSize:9,color:C.muted,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.25em",marginBottom:10}}>SEGMENTS</div>
    {segs.map((seg,i)=>{const pt=PACE_TYPES.find(p=>p.id===seg.paceType);return <div key={seg.id} style={{background:C.card,border:"1px solid "+(pt?pt.color:C.cardBorder)+"33",borderRadius:12,padding:"12px 14px",marginBottom:10,position:"relative"}}>
      <div style={{position:"absolute",left:0,top:0,bottom:0,width:3,background:pt?pt.color:C.cardBorder,borderRadius:"12px 0 0 12px"}}/>
      <div style={{paddingLeft:8}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}><div style={{fontSize:10,color:pt?pt.color:C.muted,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.2em",fontWeight:700}}>SEGMENT {i+1}</div>{segs.length>1&&<button onClick={()=>remSeg(seg.id)} style={{background:"none",border:"none",cursor:"pointer"}}><Icon n="x" size={14} color={C.muted}/></button>}</div>
        <select value={seg.paceType} onChange={e=>updSeg(seg.id,"paceType",e.target.value)} style={{...inp(),marginBottom:8}}>{PACE_TYPES.map(p=><option key={p.id} value={p.id}>{p.label} - {p.desc}</option>)}</select>
        {sp&&seg.paceType!=="rest"&&<div style={{fontSize:10,color:pt?pt.color:C.muted,fontFamily:"'Oswald',sans-serif",marginBottom:8,padding:"4px 8px",background:(pt?pt.color:C.card)+"18",borderRadius:6}}>Example ({sa.short_name}): {sp[seg.paceType]||"--"}/mi</div>}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 70px",gap:8}}>
          <div><div style={{fontSize:9,color:C.muted,fontFamily:"'Oswald',sans-serif",marginBottom:4}}>AMOUNT</div><input placeholder={seg.unit==="miles"?"3.0":seg.unit==="minutes"?"20":"400"} value={seg.amount} onChange={e=>updSeg(seg.id,"amount",e.target.value)} style={inp({padding:"9px 10px"})}/></div>
          <div><div style={{fontSize:9,color:C.muted,fontFamily:"'Oswald',sans-serif",marginBottom:4}}>UNIT</div><select value={seg.unit} onChange={e=>updSeg(seg.id,"unit",e.target.value)} style={inp({padding:"9px 10px"})}><option value="miles">Miles</option><option value="minutes">Minutes</option><option value="meters">Meters</option></select></div>
          <div><div style={{fontSize:9,color:C.muted,fontFamily:"'Oswald',sans-serif",marginBottom:4}}>REPS</div><input type="number" min="1" max="20" value={seg.reps} onChange={e=>updSeg(seg.id,"reps",e.target.value)} style={inp({padding:"9px 8px"})}/></div>
        </div>
      </div>
    </div>;})}
    <button onClick={addSeg} style={{width:"100%",padding:"11px",background:"transparent",border:"1px dashed "+C.cardBorder,borderRadius:10,color:C.muted,fontFamily:"'Oswald',sans-serif",fontSize:12,cursor:"pointer",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Icon n="plus" size={14} color={C.muted}/> ADD SEGMENT</button>
    {segs.some(s=>s.amount)&&<div style={{background:C.goldBright+"18",border:"1px solid "+C.goldBright+"33",borderRadius:10,padding:12,marginBottom:14}}><div style={{fontSize:9,color:C.goldBright,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.2em",marginBottom:6}}>PREVIEW</div><div style={{fontSize:13,color:C.white,fontFamily:"'Oswald',sans-serif"}}>{buildDetail()}</div></div>}
    <textarea placeholder="Coach notes (optional)" value={notes} onChange={e=>setNotes(e.target.value)} style={{...inp({height:70,resize:"none"}),marginBottom:16}}/>
    <button onClick={save} disabled={saving||!label||!day} style={{width:"100%",padding:"14px",background:label&&day?"linear-gradient(135deg,#1A1000,#2A1800)":C.subtle,border:"1px solid "+(label&&day?C.goldBright:C.cardBorder),borderRadius:10,color:label&&day?C.goldBright:C.muted,fontSize:14,fontWeight:700,cursor:label&&day?"pointer":"default"}}>{saving?"POSTING...":"POST WORKOUT"}</button>
  </div>;
}

function PhotoUploadBtn({meet, onRefresh}) {
  const pRef = useRef(null);
  const [uploading, setUploading] = useState(false);
  const upload = async e => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    setUploading(true);
    const urls = [];
    for (const f of files) {
      const ext = f.name.split(".").pop();
      const path = "meet-"+meet.id+"-"+Date.now()+"."+ext;
      const r = await fetch(SUPA_URL+"/storage/v1/object/app-assets/"+path, {
        method:"POST",
        headers:{apikey:SUPA_KEY,Authorization:"Bearer "+SUPA_KEY,"Content-Type":f.type,"x-upsert":"true"},
        body:f
      });
      if (r.ok) urls.push(SUPA_URL+"/storage/v1/object/public/app-assets/"+path);
    }
    const existing = meet.photos ? meet.photos.split(",").filter(Boolean) : [];
    await db.patch("meets", meet.id, {photos: [...existing, ...urls].join(",")});
    setUploading(false); onRefresh();
  };
  return <>
    <input ref={pRef} type="file" accept="image/*" multiple style={{display:"none"}} onChange={upload}/>
    <button onClick={()=>pRef.current&&pRef.current.click()} style={{width:34,height:34,borderRadius:8,background:C.subtle,border:"1px solid "+C.cardBorder,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",marginLeft:4}} title="Upload photos">
      {uploading ? <div style={{fontSize:9,color:C.gold}}>...</div> : <Icon n="plus" size={13} color={C.muted}/>}
    </button>
  </>;
}

    {myEv.map(ev=>{const recs=evRecs(ev.id);const isE=editEvId===ev.id;return <div key={ev.id} style={{background:C.card,border:"1px solid "+(isE?C.goldBright:C.cardBorder),borderRadius:12,padding:"14px 14px",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>

        <div style={{display:"flex",gap:6}}><div style={{fontSize:9,color:C.muted,padding:"2px 6px",background:C.subtle,borderRadius:4}}>{ev.type==="field"?"FIELD":"TRACK"}</div><button onClick={()=>{if(isE){setEditEvId(null);setForm({});}else{setEditEvId(ev.id);setForm({athlete_names:ev.relay?"Athlete 1, Athlete 2, Athlete 3, Athlete 4":"",mark:"",year:new Date().getFullYear()});}}} style={{padding:"3px 10px",background:isE?"transparent":"linear-gradient(135deg,#1A1000,#2A1800)",border:"1px solid "+(isE?C.muted:C.goldBright),borderRadius:6,color:isE?C.muted:C.goldBright,fontSize:10,fontFamily:"'Oswald',sans-serif",cursor:"pointer"}}>{isE?"CANCEL":"+ ADD"}</button></div>
      </div>
      {recs.map((rec,ri)=><div key={rec.id} style={{display:"flex",alignItems:"center",paddingBottom:ri<recs.length-1?6:0,marginBottom:ri<recs.length-1?6:0,borderBottom:ri<recs.length-1?"1px solid "+C.cardBorder+"55":"none"}}>
        <div style={{flex:1,fontSize:ri===0?13:11,fontFamily:"'Oswald',sans-serif",color:ri===0?C.white:C.offWhite}}>{rec.athlete_names}{rec.year?" ("+rec.year+")":""}</div>
        <div style={{fontSize:ri===0?16:13,fontFamily:"'Oswald',sans-serif",fontWeight:ri===0?700:400,color:ri===0?C.goldBright:C.muted,marginRight:8}}>{rec.mark}</div>
        <button onClick={async()=>{await db.del("records",rec.id);onRefresh();showMsg("Removed.");}} style={{background:"none",border:"none",cursor:"pointer",padding:4}}><Icon n="x" size={12} color={C.muted}/></button>
      </div>)}
      {recs.length===0&&!isE&&<div style={{fontSize:11,color:C.muted,fontFamily:"'Oswald',sans-serif",fontStyle:"italic"}}>No record on file</div>}
      {isE&&<div style={{borderTop:"1px solid "+C.cardBorder,paddingTop:12,marginTop:8}}>
        <div style={{fontSize:9,color:C.gold,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.2em",marginBottom:8}}>ADD ENTRY</div>
        <input placeholder={ev.relay?"Athlete 1, Athlete 2, Athlete 3, Athlete 4":"Athlete name"} value={form.athlete_names||""} onChange={e=>setForm({...form,athlete_names:e.target.value})} style={{...inp(),marginBottom:6}}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:6}}><input placeholder={ev.type==="time"?"Time (e.g. 1:23.45)":"Mark (e.g. 42' 6\")"} value={form.mark||""} onChange={e=>setForm({...form,mark:e.target.value})} style={inp()}/><input placeholder="Year" value={form.year||""} onChange={e=>setForm({...form,year:e.target.value})} style={inp()} type="number"/></div>
        <div style={{fontSize:9,color:C.muted,fontFamily:"'Oswald',sans-serif",marginBottom:8}}>{ev.type==="time"?"Format: M:SS.cc or MM:SS":"Format: Feet' Inches\" (e.g. 42' 6\")"}</div>
        <button onClick={saveRec} disabled={loading||!form.athlete_names||!form.mark} style={{width:"100%",padding:"10px",background:form.athlete_names&&form.mark?"linear-gradient(135deg,#1A1000,#2A1800)":C.subtle,border:"1px solid "+(form.athlete_names&&form.mark?C.goldBright:C.cardBorder),borderRadius:8,color:form.athlete_names&&form.mark?C.goldBright:C.muted,fontSize:13,fontWeight:700,cursor:form.athlete_names&&form.mark?"pointer":"default"}}>{loading?"SAVING...":"SAVE RECORD"}</button>
      </div>}
    </div>;})}
  </div>;
}

    </div>

function CoachTab({athletes,meets,workouts,results,records,onRefresh,onOpenTiming,logoUrl,setLogoUrl}){

  if(!auth)return <PinGate onSuccess={()=>setAuth(true)}/>;
  if(view==="roster")return <RosterManager athletes={athletes} onBack={()=>setView("main")} onRefresh={onRefresh} showMsg={showMsg}/>;

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}><div><div style={{fontSize:10,color:C.goldDim,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.25em"}}>COACH PORTAL</div><div style={{fontSize:24,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.white}}>DASHBOARD</div></div><button onClick={()=>setAuth(false)} style={{padding:"5px 10px",background:C.card,border:"1px solid "+C.cardBorder,borderRadius:8,color:C.muted,fontSize:10,cursor:"pointer"}}>LOGOUT</button></div>
    {msg&&<div style={{background:C.goldBright+"18",border:"1px solid "+C.goldBright+"44",borderRadius:8,padding:10,marginBottom:12,fontSize:12,color:C.goldBright,fontFamily:"'Oswald',sans-serif",textAlign:"center"}}>{"OK " +msg}</div>}
    <div style={{display:"flex",gap:8,marginBottom:14}}>{[{l:"ATHLETES",v:athletes.length},{l:"BOYS",v:athletes.filter(a=>a.gender==="boys").length},{l:"GIRLS",v:athletes.filter(a=>a.gender==="girls").length},{l:"W/ PHONE",v:athletes.filter(a=>a.parent_phone).length}].map(s=><div key={s.l} style={{flex:1,background:C.card,borderRadius:10,padding:"10px 8px",border:"1px solid "+C.cardBorder,textAlign:"center"}}><div style={{fontSize:18,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.goldBright}}>{s.v}</div><div style={{fontSize:8,color:C.muted,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.1em"}}>{s.l}</div></div>)}</div>
    {[{i:"timer",l:"Live Meet Timing",s:"Tap athletes at each checkpoint",action:()=>onOpenTiming()},{i:"team",l:"Manage Roster",s:athletes.length+" athletes",action:()=>setView("roster")},{i:"cal",l:"Meet Schedule",s:"Add and edit meets for Fall 2026",action:()=>setView("meets")},{i:"chart",l:"Edit Results",s:"Add missed athletes, fix times",action:()=>setView("results")},{i:"bolt",l:"Post Workout",s:"Build week plan with Daniels paces",action:()=>setView("workout")},{i:"trophy",l:"Manage Records",s:"Add and edit school records",action:()=>setView("records")}].map(t=><button key={t.l} onClick={t.action} style={{width:"100%",display:"flex",alignItems:"center",background:C.card,border:"1px solid "+C.cardBorder,borderRadius:12,padding:"14px 14px",marginBottom:8,cursor:"pointer",textAlign:"left"}}>
      <div style={{width:40,height:40,borderRadius:10,background:C.goldBright+"18",border:"1px solid "+C.goldBright+"33",display:"flex",alignItems:"center",justifyContent:"center",marginRight:12}}><Icon n={t.i} size={18} color={C.goldBright}/></div>
      <div style={{flex:1}}><div style={{fontSize:14,fontFamily:"'Oswald',sans-serif",fontWeight:600,color:C.white}}>{t.l}</div><div style={{fontSize:10,color:C.muted,fontFamily:"'Oswald',sans-serif",marginTop:2}}>{t.s}</div></div>
      <div style={{color:C.muted,fontSize:20}}>{">"}</div>
    </button>)}
    <div style={{background:C.card,border:"1px solid "+C.cardBorder,borderRadius:12,padding:"14px 14px",marginBottom:8}}><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:40,height:40,borderRadius:10,background:C.goldBright+"18",border:"1px solid "+C.goldBright+"33",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="gear" size={18} color={C.goldBright}/></div><div style={{flex:1}}><div style={{fontSize:14,fontFamily:"'Oswald',sans-serif",fontWeight:600,color:C.white}}>Upload App Logo</div><div style={{fontSize:10,color:C.muted,fontFamily:"'Oswald',sans-serif",marginTop:2}}>{logoUrl?"Custom logo active":"Using default logo"}</div></div><input ref={logoRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleLogo}/><button onClick={()=>logoRef.current&&logoRef.current.click()} style={{padding:"6px 12px",background:"linear-gradient(135deg,#1A1000,#2A1800)",border:"1px solid "+C.goldBright,borderRadius:8,color:C.goldBright,fontSize:11,fontFamily:"'Oswald',sans-serif",cursor:"pointer"}}>{logoUp?"...":"UPLOAD"}</button></div></div>
    <div style={{background:C.card,border:"1px solid "+C.cardBorder,borderRadius:12,padding:"14px 14px"}}><div style={{display:"flex",alignItems:"center",gap:12}}><div style={{width:40,height:40,borderRadius:10,background:C.goldBright+"18",border:"1px solid "+C.goldBright+"33",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon n="shirt" size={18} color={C.goldBright}/></div><div style={{flex:1}}><div style={{fontSize:14,fontFamily:"'Oswald',sans-serif",fontWeight:600,color:C.white}}>BSN Apparel Store</div><div style={{fontSize:10,color:C.muted,fontFamily:"'Oswald',sans-serif",marginTop:2}}>Official team gear link</div></div><button onClick={()=>window.open("https://bsnsports.com","_blank")} style={{padding:"6px 12px",background:"linear-gradient(135deg,#1A1000,#2A1800)",border:"1px solid "+C.goldBright,borderRadius:8,color:C.goldBright,fontSize:11,fontFamily:"'Oswald',sans-serif",cursor:"pointer"}}>OPEN</button></div></div>
  </div>;
}

function AthleteSelector({athletes,favIds,onToggleFav,onSelect,onClose}){
  const [gf,setGf]=useState("all");const list=athletes.filter(a=>gf==="all"||a.gender===gf);
  const Row=({a})=><div style={{display:"flex",alignItems:"center",background:C.card,border:"1px solid "+C.cardBorder,borderRadius:12,padding:"11px 12px",marginBottom:8}}>
    <button onClick={()=>onToggleFav(a.id)} style={{background:"none",border:"none",cursor:"pointer",marginRight:8}}><svg width="18" height="18" viewBox="0 0 24 24" fill={favIds.includes(a.id)?C.goldBright:"none"} stroke={favIds.includes(a.id)?C.goldBright:C.muted} strokeWidth="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
    <button onClick={()=>onSelect(a)} style={{flex:1,display:"flex",alignItems:"center",background:"none",border:"none",cursor:"pointer",textAlign:"left"}}><Avatar athlete={a} size={38}/><div style={{flex:1,marginLeft:12}}><div style={{fontSize:14,fontFamily:"'Oswald',sans-serif",fontWeight:600,color:C.white}}>{a.name}</div><div style={{fontSize:10,color:C.muted,fontFamily:"'Oswald',sans-serif",marginTop:1}}>GR {a.grade} - {a.pr_3k||"--"}</div></div><div style={{fontSize:20,color:C.muted}}>{">"}</div></button>
  </div>;
  return <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.95)",zIndex:50,display:"flex",flexDirection:"column"}}>
    <div style={{background:C.card,borderBottom:"1px solid "+C.cardBorder,paddingTop:58,paddingBottom:14,paddingLeft:18,paddingRight:18}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}><div style={{fontSize:20,fontFamily:"'Oswald',sans-serif",fontWeight:700,color:C.white}}>SELECT ATHLETE</div><button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer"}}><Icon n="x" size={22} color={C.muted}/></button></div>
      <div style={{display:"flex",background:C.black,borderRadius:10,padding:3,border:"1px solid "+C.cardBorder}}>{["all","boys","girls"].map(g=><button key={g} onClick={()=>setGf(g)} style={{flex:1,padding:"8px 0",background:gf===g?"linear-gradient(135deg,#1A1000,#2A1800)":"transparent",border:"none",borderRadius:8,color:gf===g?C.goldBright:C.muted,fontSize:11,cursor:"pointer",fontWeight:gf===g?700:400}}>{g.toUpperCase()}</button>)}</div>
    </div>
    <div style={{flex:1,overflowY:"auto",padding:"12px 16px"}}>
      {favIds.length>0&&<><div style={{fontSize:10,color:C.goldBright,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.3em",marginBottom:10}}>STARRED</div>{athletes.filter(a=>favIds.includes(a.id)).map(a=><Row key={a.id} a={a}/>)}<div style={{height:1,background:C.cardBorder,margin:"12px 0"}}/></>}
      <div style={{fontSize:10,color:C.muted,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.3em",marginBottom:10}}>ALL ATHLETES</div>
      {list.map(a=><Row key={a.id} a={a}/>)}
    </div>
  </div>;
}

function NavBar({active,onSelect}){
  const tabs=[{id:"athletes",i:"team",l:"ATHLETES"},{id:"schedule",i:"cal",l:"SCHEDULE"},{id:"home",i:"home",l:"HOME"},{id:"train",i:"bolt",l:"TRAIN"},{id:"records",i:"trophy",l:"RECORDS"},{id:"coach",i:"flag",l:"COACH"}];
  return <div style={{position:"absolute",bottom:0,left:0,right:0,background:C.black,borderTop:"1px solid "+C.cardBorder,display:"flex",paddingBottom:18,paddingTop:8}}>
    {tabs.map(t=><button key={t.id} onClick={()=>onSelect(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,background:"none",border:"none",cursor:"pointer",padding:"3px 0"}}>
      <Icon n={t.i} size={19} color={active===t.id?C.goldBright:C.muted}/>
      <div style={{fontSize:7,color:active===t.id?C.goldBright:C.muted,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.08em",fontWeight:active===t.id?700:400}}>{t.l}</div>
      {active===t.id&&<div style={{width:3,height:3,borderRadius:"50%",background:C.goldBright}}/>}
    </button>)}
  </div>;
}

function App(){
  const [splash,setSplash]=useState(true);const [tab,setTab]=useState("home");const [sloganIdx,setSloganIdx]=useState(0);const [favIds,setFavIds]=useState([]);const [showSel,setShowSel]=useState(false);const [viewingA,setViewingA]=useState(null);const [showTiming,setShowTiming]=useState(false);
  const [athletes,setAthletes]=useState([]);const [meets,setMeets]=useState([]);const [workouts,setWorkouts]=useState([]);const [results,setResults]=useState([]);const [records,setRecords]=useState([]);
  const [loading,setLoading]=useState(true);const [dbErr,setDbErr]=useState(false);const [logoUrl,setLogoUrl]=useState(null);
  const fetchAll=useCallback(async()=>{
    try{
      const [a,m,w,r,rec]=await Promise.all([db.get("athletes","?active=eq.true&order=grade.asc"),db.get("meets","?order=created_at.asc"),db.get("workouts","?order=created_at.desc&limit=14"),db.get("results","?order=created_at.desc"),db.get("records","?order=event_id.asc,mark_sortable.asc")]);
      if(Array.isArray(a))setAthletes(a);else setDbErr(true);
      if(Array.isArray(m))setMeets(m);if(Array.isArray(w))setWorkouts(w);if(Array.isArray(r))setResults(r);if(Array.isArray(rec))setRecords(rec);
      fetch(SUPA_URL+"/storage/v1/object/public/app-assets/logo.png",{method:"HEAD"}).then(rr=>rr.ok&&setLogoUrl(SUPA_URL+"/storage/v1/object/public/app-assets/logo.png")).catch(()=>{});
    }catch(e){console.error(e);setDbErr(true);}
    setLoading(false);
  },[]);
  useEffect(()=>{fetchAll();},[]);
  useEffect(()=>{const t=setInterval(()=>setSloganIdx(i=>(i+1)%SLOGANS.length),6000);return()=>clearInterval(t);},[]);
  const toggleFav=id=>setFavIds(fs=>fs.includes(id)?fs.filter(f=>f!==id):[...fs,id]);
  const viewAthlete=a=>{setViewingA(a);setShowSel(false);};
  const selTab=t=>{setTab(t);setViewingA(null);setShowTiming(false);};
  const isWide=window.innerWidth>440;
  return <div style={{width:"100%",maxWidth:430,height:"100dvh",maxHeight:isWide?932:"100dvh",margin:"0 auto",background:C.black,position:"relative",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:isWide?"0 0 80px rgba(0,0,0,0.95)":"none",borderRadius:isWide?44:0}}>
    {splash&&<Splash onDone={()=>setSplash(false)} logoUrl={logoUrl}/>}
    {showSel&&<AthleteSelector athletes={athletes} favIds={favIds} onToggleFav={toggleFav} onSelect={viewAthlete} onClose={()=>setShowSel(false)}/>}
    {showTiming&&<LiveTiming athletes={athletes} meets={meets} onClose={()=>setShowTiming(false)}/>}
    {viewingA&&!showTiming&&<div style={{position:"absolute",inset:0,background:C.black,zIndex:30,display:"flex",flexDirection:"column"}}><div style={{flex:1,overflowY:"auto",paddingBottom:88}}><AthleteProfile athlete={viewingA} results={results} meets={meets} onBack={()=>setViewingA(null)} isFav={favIds.includes(viewingA.id)} onToggleFav={toggleFav}/></div><NavBar active={tab} onSelect={selTab}/></div>}
    {!viewingA&&!showTiming&&<>
      <div style={{flex:1,overflowY:"auto",paddingBottom:88}}>
        {loading?<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",gap:16}}><Logo size={70} logoUrl={logoUrl}/><div style={{fontSize:12,color:C.muted,fontFamily:"'Oswald',sans-serif",letterSpacing:"0.2em"}}>LOADING THE HERD...</div></div>
        :dbErr?<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"60vh",gap:16,padding:24}}><Logo size={60} logoUrl={logoUrl}/><div style={{fontSize:16,color:C.white,fontFamily:"'Oswald',sans-serif",fontWeight:700,textAlign:"center"}}>CONNECTION ERROR</div><div style={{fontSize:12,color:C.muted,fontFamily:"'Oswald',sans-serif",textAlign:"center",lineHeight:1.6}}>Could not reach Supabase.</div><button onClick={fetchAll} style={{padding:"10px 24px",background:"linear-gradient(135deg,#1A1000,#2A1800)",border:"1px solid "+C.goldBright,borderRadius:10,color:C.goldBright,fontSize:13,fontWeight:700,cursor:"pointer"}}>RETRY</button></div>
        :<>
          <Header slogan={SLOGANS[sloganIdx]} onLogoPress={()=>setShowSel(true)} logoUrl={logoUrl}/>
          {tab==="home"     &&<HomeTab athletes={athletes} meets={meets} favIds={favIds} onOpenSelector={()=>setShowSel(true)} logoUrl={logoUrl} results={results} onViewAthlete={viewAthlete}/>}
          {tab==="athletes" &&<AthletesTab athletes={athletes} onView={viewAthlete} favIds={favIds} onToggleFav={toggleFav}/>}
          {tab==="schedule" &&<ScheduleTab meets={meets}/>}
          {tab==="train"    &&<TrainTab workouts={workouts} athletes={athletes}/>}
          {tab==="records"  &&<RecordsTab records={records}/>}
          {tab==="coach"    &&<CoachTab athletes={athletes} meets={meets} workouts={workouts} results={results} records={records} onRefresh={fetchAll} onOpenTiming={()=>setShowTiming(true)} logoUrl={logoUrl} setLogoUrl={setLogoUrl}/>}
        </>}
      </div>
      <NavBar active={tab} onSelect={selTab}/>
    </>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
